<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informa Bekasi AI</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .office { width: 90%; max-width: 400px; background: #222; border: 2px solid #444; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .bubble { background: white; color: #333; padding: 15px; border-radius: 15px; margin-bottom: 20px; min-height: 50px; font-weight: bold; }
        .avatar { width: 100px; margin-bottom: 10px; }
        .btn { background: #27ae60; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-size: 16px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h1 style="color: #f39c12;">INFORMA MM BEKASI</h1>
    <div class="office">
        <div id="msg" class="bubble">Siap memulai meeting, Pak Agung?</div>
        <img id="img" src="https://api.dicebear.com/7.x/bottts/svg?seed=Manager" class="avatar">
        <div id="role" style="color: #f39c12; font-weight: bold; margin-bottom: 20px;">Sistem Siap</div>
    </div>
    <br>
    <button id="btn" class="btn" onclick="start()">MULAI MEETING AI</button>

    <script>
        async function start() {
            const msg = document.getElementById('msg');
            const btn = document.getElementById('btn');
            btn.disabled = true;
            msg.innerText = "Menghubungi Manager...";

            try {
                const res = await fetch('/jalankan_kantor');
                const data = await res.json();
                
                // Menampilkan hasil instruksi atau error asli
                msg.innerText = data.text;
                document.getElementById('role').innerText = data.role;
            } catch (e) {
                msg.innerText = "Koneksi ke server Vercel gagal.";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
